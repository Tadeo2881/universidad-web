<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Gestión Docente - UTERA</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="logo-utera.png" alt="Logo UTERA" class="logo">
      <div class="info-header">
        <h1>Panel de Gestión Docente</h1>
        <p>Universidad UTERA - Control Académico Total</p>
      </div>
    </div>
  </header>

  <main>
    <section style="display: flex; justify-content: space-around; background: #003366; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
      <div><p style="font-size: 0.75em; margin: 0; opacity: 0.8;">Materiales 1-2 Sem</p><span id="cont-1-2" style="font-size: 1.8em; font-weight: bold;">0</span></div>
      <div style="border-left: 1px solid rgba(255,255,255,0.3); padding-left: 20px;"><p style="font-size: 0.75em; margin: 0; opacity: 0.8;">Materiales 3-4 Sem</p><span id="cont-3-4" style="font-size: 1.8em; font-weight: bold;">0</span></div>
      <div style="border-left: 1px solid rgba(255,255,255,0.3); padding-left: 20px;"><p style="font-size: 0.75em; margin: 0; opacity: 0.8;">Materiales 5-6 Sem</p><span id="cont-5-6" style="font-size: 1.8em; font-weight: bold;">0</span></div>
    </section>

    <section class="acceso-unidad" style="text-align: left; background-color: #f8f9fa; border-left: 5px solid #003366; padding: 20px; border-radius: 8px;">
      <h3 style="margin-bottom: 15px; color: #003366;">📍 Selección de Materia</h3>
      <div style="display: flex; gap: 15px; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 200px;">
          <label><strong>Carrera:</strong></label>
          <select id="carreraSelect" onchange="actualizarMaterias()" style="padding: 10px; border-radius: 5px; width: 100%; margin-top: 5px;">
            <option value="software">Ingeniería en Desarrollo de Software</option>
            <option value="ciber">Ingeniería en Ciberseguridad</option>
            <option value="energias">Ingeniería en Energías Renovables</option>
          </select>
        </div>
        <div style="flex: 1; min-width: 120px;">
          <label><strong>Semestre:</strong></label>
          <select id="semestreSelect" onchange="actualizarMaterias()" style="padding: 10px; border-radius: 5px; width: 100%; margin-top: 5px;">
            <option value="1">1ro</option><option value="2">2do</option><option value="3">3ro</option>
            <option value="4">4to</option><option value="5">5to</option><option value="6">6to</option>
          </select>
        </div>
        <div style="flex: 1; min-width: 200px;">
          <label><strong>Materia activa:</strong></label>
          <select id="materiaSelect" style="padding: 10px; border-radius: 5px; width: 100%; margin-top: 5px; background: #eef; border: 1px solid #003366;">
            </select>
        </div>
      </div>
    </section>

    <section class="acceso-unidad" style="margin-top: 20px; border: 2px solid #ffcc00; padding: 20px; border-radius: 12px; background: #fffcf0;">
      <h4 style="color: #856404; margin-bottom: 10px;">👤 Registro de Alumnos</h4>
      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <input type="text" id="nomAlumno" placeholder="Nombre completo" style="flex: 2; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <input type="number" id="codAlumno" placeholder="PIN 6 dígitos" style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <button onclick="altaAlumno()" class="boton-ingresar" style="background-color: #ffcc00; color: black; border: none; font-weight: bold;">Dar de Alta</button>
      </div>
    </section>

    <div style="display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap;">
      <div style="flex: 1; min-width: 300px; border: 2px solid #003366; padding: 20px; border-radius: 12px; background: white;">
        <h4 style="color: #003366;">📂 Subir Temas / Recursos</h4>
        <input type="text" id="titMaterial" placeholder="Título del material" style="width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        
        <input type="file" id="fileIn" accept=".pdf, .ppt, .pptx, .xls, .xlsx" onchange="preview()" style="width: 100%; padding: 10px; border: 1px dashed #003366; background: #f0f4f8;">

        <div id="vistaBox" style="display: none; margin-top: 10px; padding: 10px; background: #eef; border-radius: 5px; font-size: 0.85em; color: #003366; border-left: 4px solid #003366;">
          <span id="previewName"></span>
        </div>
        
        <button onclick="publicarMaterial()" class="boton-ingresar" style="width: 100%; margin-top: 15px; background-color: #003366;">Publicar en Portal</button>
      </div>
    </div>

    <div style="text-align: center; margin-top: 40px; padding-bottom: 30px;">
      <a href="login.html" style="color: #888; text-decoration: none; font-weight: bold;">← Salir del Sistema</a>
    </div>
  </main>

  <script>
    // Base de datos de materias basada en tus fotos anteriores
    const dbMaterias = {
      software: {
        1: ["Lógica y Algoritmos", "Matemáticas"], 2: ["POO", "Web I"],
        3: ["Bases de Datos", "Redes"], 4: ["Fullstack", "Móviles"],
        5: ["IA", "Ing. Software"], 6: ["Proyecto Final", "Ética"]
      },
      ciber: {
        1: ["Seguridad I", "Redes"], 3: ["Criptografía", "Sistemas Seguros"],
        4: ["Hacking Ético", "Auditoría"], 6: ["Gestión Riesgos", "Forense"]
      },
      energias: {
        1: ["Termodinámica", "Solar"], 2: ["Eólica", "Biomasa"],
        4: ["Eficiencia", "Plantas"], 6: ["Proyectos", "Ambiente"]
      }
    };

    let s1=0, s2=0, s3=0;

    function actualizarMaterias() {
      const carrera = document.getElementById('carreraSelect').value;
      const semestre = document.getElementById('semestreSelect').value;
      const mSelect = document.getElementById('materiaSelect');
      mSelect.innerHTML = "";
      const lista = dbMaterias[carrera][semestre] || ["Materia General"];
      lista.forEach(m => {
        let o = document.createElement("option"); o.text = m; mSelect.add(o);
      });
    }

    function preview() {
      const f = document.getElementById('fileIn').files[0];
      const b = document.getElementById('vistaBox');
      if (f) { b.style.display = 'block'; document.getElementById('previewName').innerText = "📄 Archivo: " + f.name; }
    }

    function altaAlumno() {
      const n = document.getElementById('nomAlumno').value;
      const c = document.getElementById('codAlumno').value;
      if(n==="" || c.length!==6) { alert("⚠️ Nombre incompleto o PIN no es de 6 dígitos."); return; }
      alert(`✅ Alumno ${n} registrado.\nPIN: ${c}`);
      document.getElementById('nomAlumno').value=""; document.getElementById('codAlumno').value="";
    }

    function publicarMaterial() {
      const sem = document.getElementById('semestreSelect').value;
      const tit = document.getElementById('titMaterial').value;
      if(!tit) { alert("Escribe un título"); return; }
      
      if(sem=="1"||sem=="2") { s1++; document.getElementById('cont-1-2').innerText=s1; }
      else if(sem=="3"||sem=="4") { s2++; document.getElementById('cont-3-4').innerText=s2; }
      else { s3++; document.getElementById('cont-5-6').innerText=s3; }

      alert("🚀 ¡Publicado con éxito!");
      document.getElementById('titMaterial').value=""; document.getElementById('fileIn').value="";
      document.getElementById('vistaBox').style.display='none';
    }

    window.onload = actualizarMaterias;
  </script>
</body>
</html>
