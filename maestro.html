<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Docente - UTERA</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="logo-utera.png" alt="Logo UTERA" class="logo">
      <div class="info-header">
        <h1>Panel de Gestión Docente</h1>
        <p>Universidad UTERA - Modo Administración</p>
      </div>
    </div>
  </header>

  <main>
    <section class="acceso-unidad" style="text-align: left; background-color: #f8f9fa; border-left: 5px solid #003366;">
      <h3 style="margin-bottom: 15px;">📍 Ubicación de Contenido</h3>
      <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <div>
          <label><strong>1. Carrera:</strong></label><br>
          <select id="carrera" style="padding: 10px; border-radius: 5px; width: 250px;">
            <option>Ingeniería en Desarrollo de Software</option>
            <option>Ingeniería en Ciberseguridad</option>
            <option>Ingeniería en Energías Renovables</option>
          </select>
        </div>
        <div>
          <label><strong>2. Semestre:</strong></label><br>
          <select id="semestre" style="padding: 10px; border-radius: 5px; width: 150px;">
            <option>1er Semestre</option>
            <option>2do Semestre</option>
            <option>3er Semestre</option>
            <option>4to Semestre</option>
            <option>5to Semestre</option>
            <option>6to Semestre</option>
          </select>
        </div>
      </div>
    </section>

    <div style="display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap;">
      
      <div style="flex: 1; min-width: 300px; border: 2px solid #003366; padding: 20px; border-radius: 12px; background: white;">
        <h4 style="color: #003366;">📚 Subir Material / Temas</h4>
        <hr style="margin: 10px 0;">
        <label>Título del Material:</label>
        <input type="text" id="tituloMaterial" placeholder="Ej: Introducción a redes" style="width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        
        <label>Descripción:</label>
        <textarea placeholder="Explica brevemente de qué trata este material..." style="width: 100%; height: 80px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;"></textarea>
        
        <label style="margin-top: 10px; display: block;">Adjuntar archivo (PDF, PPT, ZIP):</label>
        <input type="file" style="margin-top: 5px; width: 100%;">
        
        <button onclick="confirmarAccion('Material')" class="boton-ingresar" style="width: 100%; margin-top: 15px; background-color: #003366;">Publicar Material</button>
      </div>

      <div style="flex: 1; min-width: 300px; border: 2px solid #28a745; padding: 20px; border-radius: 12px; background: white;">
        <h4 style="color: #28a745;">📝 Asignar Nueva Tarea</h4>
        <hr style="margin: 10px 0;">
        <label>Nombre de la Actividad:</label>
        <input type="text" id="nombreTarea" placeholder="Ej: Práctica de Criptografía" style="width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        
        <label>Fecha Límite de Entrega:</label>
        <input type="date" style="width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        
        <label>Puntaje Máximo:</label>
        <input type="number" placeholder="100" style="width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        
        <button onclick="confirmarAccion('Tarea')" class="boton-ingresar" style="width: 100%; margin-top: 15px; background-color: #28a745; border: none;">Asignar Tarea a la Clase</button>
      </div>

    </div>

    <div style="text-align: center; margin-top: 30px;">
      <a href="login.html" style="text-decoration: none; color: #666; font-weight: bold;">← Cerrar Sesión</a>
    </div>
  </main>

  <script>
    function confirmarAccion(tipo) {
      const carrera = document.getElementById('carrera').value;
      const semestre = document.getElementById('semestre').value;
      
      alert("✅ ¡Éxito! El " + tipo + " ha sido publicado correctamente en " + carrera + " para el " + semestre + ".");
    }
  </script>

</body>
</html>
