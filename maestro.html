<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Docente - UTERA</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="logo-utera.png" alt="Logo UTERA" class="logo">
      <div class="info-header">
        <h1>Panel de Gestión Docente</h1>
        <p>Universidad UTERA - Control de Avance Académico</p>
      </div>
    </div>
  </header>

  <main>
    <section class="acceso-unidad" style="display: flex; justify-content: space-around; background: #003366; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center;">
      <div>
        <p style="font-size: 0.8em; margin: 0;">Materiales 1er-2do Sem</p>
        <span id="cont-1-2" style="font-size: 1.5em; font-weight: bold;">0</span>
      </div>
      <div style="border-left: 1px solid rgba(255,255,255,0.3); padding-left: 20px;">
        <p style="font-size: 0.8em; margin: 0;">Materiales 3er-4to Sem</p>
        <span id="cont-3-4" style="font-size: 1.5em; font-weight: bold;">0</span>
      </div>
      <div style="border-left: 1px solid rgba(255,255,255,0.3); padding-left: 20px;">
        <p style="font-size: 0.8em; margin: 0;">Materiales 5to-6to Sem</p>
        <span id="cont-5-6" style="font-size: 1.5em; font-weight: bold;">0</span>
      </div>
    </section>

    <section class="acceso-unidad" style="text-align: left; background-color: #f8f9fa; border-left: 5px solid #ffcc00; padding: 20px; border-radius: 8px;">
      <h3 style="margin-bottom: 15px; color: #003366;">📍 Ubicación de Contenido</h3>
      <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 200px;">
          <label><strong>Carrera:</strong></label><br>
          <select id="carreraSelect" style="padding: 10px; border-radius: 5px; width: 100%; margin-top: 5px;">
            <option>Software</option><option>Ciberseguridad</option><option>Energías</option>
          </select>
        </div>
        <div style="flex: 1; min-width: 150px;">
          <label><strong>Semestre:</strong></label><br>
          <select id="semestreSelect" style="padding: 10px; border-radius: 5px; width: 100%; margin-top: 5px;">
            <option value="1">1er Semestre</option><option value="2">2do Semestre</option>
            <option value="3">3er Semestre</option><option value="4">4to Semestre</option>
            <option value="5">5to Semestre</option><option value="6">6to Semestre</option>
          </select>
        </div>
      </div>
    </section>

    <div style="display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap;">
      <div style="flex: 1; min-width: 300px; border: 2px solid #003366; padding: 20px; border-radius: 12px; background: white;">
        <h4 style="color: #003366;">📂 Subir Archivos (PDF, PPT, EXCEL)</h4>
        <input type="text" id="tituloMaterial" placeholder="Título del Recurso" style="width: 100%; margin: 10px 0; padding: 12px; border-radius: 5px; border: 1px solid #ccc;">
        
        <input type="file" id="fileInput" accept=".pdf, .ppt, .pptx, .xls, .xlsx" onchange="mostrarVistaPrevia()" style="width: 100%; padding: 10px; border: 1px dashed #003366; background: #f0f4f8;">

        <div id="vistaPrevia" style="display: none; margin-top: 10px; padding: 10px; background: #eee; border-radius: 5px; font-size: 0.9em;">
          <span id="infoArchivo"></span>
        </div>
        
        <button onclick="publicar()" class="boton-ingresar" style="width: 100%; margin-top: 15px; background-color: #003366;">Publicar Material</button>
      </div>
    </div>
    
    <div style="text-align: center; margin-top: 40px;">
      <a href="login.html" style="color: #888; text-decoration: none;">← Salir</a>
    </div>
  </main>

  <script>
    // Variables para los contadores
    let cat1 = 0; let cat2 = 0; let cat3 = 0;

    function mostrarVistaPrevia() {
      const input = document.getElementById('fileInput');
      const vista = document.getElementById('vistaPrevia');
      if (input.files[0]) {
        vista.style.display = 'block';
        document.getElementById('infoArchivo').innerText = "📄 Seleccionado: " + input.files[0].name;
      }
    }

    function publicar() {
      const sem = document.getElementById('semestreSelect').value;
      const titulo = document.getElementById('tituloMaterial').value;

      if(titulo === "") { alert("Ponle un título al material"); return; }

      // Lógica de contadores por semestre
      if (sem == "1" || sem == "2") { cat1++; document.getElementById('cont-1-2').innerText = cat1; }
      else if (sem == "3" || sem == "4") { cat2++; document.getElementById('cont-3-4').innerText = cat2; }
      else { cat3++; document.getElementById('cont-5-6').innerText = cat3; }

      alert("✅ ¡Publicado!\nContenido enviado al Semestre " + sem);
      
      // Limpiar para el siguiente
      document.getElementById('tituloMaterial').value = "";
      document.getElementById('fileInput').value = "";
      document.getElementById('vistaPrevia').style.display = 'none';
    }
  </script>
</body>
</html>
