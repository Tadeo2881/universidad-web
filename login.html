<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso UTERA</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="logo-utera.png" alt="Logo UTERA" class="logo">
      <div class="info-header"><h1>Portal Académico</h1></div>
    </div>
  </header>

  <main style="display: flex; gap: 20px; flex-wrap: wrap;">
    <section class="acceso-unidad" style="flex: 1; min-width: 280px; border-top: 5px solid #003366;">
      <h2>👨‍🏫 Acceso Maestro</h2>
      <p>Introduce la clave autorizada para gestionar el aula.</p>
      <input type="password" id="passMaestro" placeholder="Clave de 6 dígitos" style="width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #003366; border-radius: 5px;">
      <button onclick="validar()" class="boton" style="background-color: #003366; width: 100%; border: none; cursor: pointer;">Entrar al Panel</button>
    </section>

    <section class="acceso-unidad" style="flex: 1; min-width: 280px; border-top: 5px solid #4a90e2;">
      <h2>👨‍🎓 Acceso Alumno</h2>
      <p>Consulta tus notas y descarga materiales de estudio.</p>
      <a href="alumno.html" class="boton" style="width: 100%; display: block; margin-top: 20px;">Entrar como Alumno</a>
    </section>
  </main>

  <script>
    function validar() {
      var clave = document.getElementById('passMaestro').value;
      if (clave === "810217") {
        window.location.href = "maestro.html";
      } else {
        alert("❌ Clave incorrecta. Solo el personal docente tiene acceso.");
      }
    }
  </script>
</body>
</html>
