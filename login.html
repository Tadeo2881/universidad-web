<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso UTERA</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="logo-utera.png" alt="Logo UTERA" class="logo">
      <div class="info-header"><h1>Portal Académico</h1></div>
    </div>
  </header>

  <main style="display: flex; gap: 20px; flex-wrap: wrap;">
    <section class="acceso-unidad" style="flex: 1; min-width: 280px; border-top: 5px solid #003366;">
      <h2>👨‍🏫 Maestro</h2>
      <p>Clave de acceso requerida</p>
      <input type="text" id="userMaestro" placeholder="Usuario Docente"><br>
      <input type="password" id="passMaestro" placeholder="Clave DiES" style="width: 100%; padding: 10px; margin: 10px 0;"><br>
      <button onclick="validarMaestro()" class="boton" style="background-color: #003366; width: 100%; border: none; cursor: pointer;">Entrar al Panel</button>
    </section>

    <section class="acceso-unidad" style="flex: 1; min-width: 280px; border-top: 5px solid #4a90e2;">
      <h2>👨‍🎓 Alumno</h2>
      <p>Ingresa con tu matrícula</p>
      <input type="text" placeholder="Matrícula Alumno"><br>
      <input type="password" placeholder="Contraseña" style="width: 100%; padding: 10px; margin: 10px 0;"><br>
      <a href="alumno.html" class="boton">Entrar como Alumno</a>
    </section>
  </main>

  <script>
    function validarMaestro() {
      var clave = document.getElementById('passMaestro').value;
      if (clave === "810217") {
        window.location.href = "maestro.html";
      } else {
        alert("Clave incorrecta. Solo personal autorizado.");
      }
    }
  </script>
</body>
</html>
